plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.2'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'az.edu.ada.wm2'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

// Keep Gradle output off OneDrive/Desktop to avoid "Unable to delete directory ... build\classes"
// (OneDrive + antivirus + IDE often lock files under the project folder.)
def gradleBuildOut = System.getenv('LOCALAPPDATA')
if (gradleBuildOut != null && !gradleBuildOut.isBlank()) {
	layout.buildDirectory.set(file("${gradleBuildOut}/GradleBuildOut/${rootProject.name}"))
} else {
	layout.buildDirectory.set(file("${System.getProperty('user.home')}/.gradle-build-out/${rootProject.name}"))
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	runtimeOnly 'com.h2database:h2'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testCompileOnly 'org.projectlombok:lombok'
	testAnnotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-data-jpa-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}
